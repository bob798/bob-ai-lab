<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="90" x2="1310" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="920" rx="28" fill="url(#bg)"/>
  <text x="88" y="112" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="54" font-weight="700">AI 时代的需求管理，不是写更长，而是按层管理</text>
  <text x="88" y="160" fill="#475569" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">把战略、需求、行为、实现拆开，才能减少翻译损耗和场景遗漏</text>

  <rect x="88" y="230" width="1224" height="120" rx="24" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="126" y="282" fill="#1D4ED8" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">层级 1</text>
  <text x="126" y="322" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700">战略层 Why</text>
  <text x="520" y="282" fill="#334155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24">产品愿景 / OKR / JTBD</text>
  <text x="520" y="322" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30">负责定义目标和版本边界</text>
  <text x="1090" y="312" fill="#1E3A8A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">Human 主导</text>

  <rect x="88" y="390" width="1224" height="120" rx="24" fill="#CFFAFE" stroke="#22D3EE" stroke-width="2"/>
  <text x="126" y="442" fill="#0E7490" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">层级 2</text>
  <text x="126" y="482" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700">需求层 Who + What</text>
  <text x="520" y="442" fill="#334155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24">User Story</text>
  <text x="520" y="482" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30">负责说明谁在什么场景下要达成什么目标</text>
  <text x="1030" y="472" fill="#155E75" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">Human 主导 / AI 辅助</text>

  <rect x="88" y="550" width="1224" height="120" rx="24" fill="#DCFCE7" stroke="#4ADE80" stroke-width="2"/>
  <text x="126" y="602" fill="#15803D" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">层级 3</text>
  <text x="126" y="642" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700">行为层 When + How much</text>
  <text x="520" y="602" fill="#334155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24">BDD / Gherkin</text>
  <text x="520" y="642" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30">负责把目标展开成可验收的场景和标准</text>
  <text x="1050" y="632" fill="#166534" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">AI 推导 / Human 确认</text>

  <rect x="88" y="710" width="1224" height="120" rx="24" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  <text x="126" y="762" fill="#B45309" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">层级 4</text>
  <text x="126" y="802" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700">实现层 How</text>
  <text x="520" y="762" fill="#334155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24">SPEC / Instructions / TDD</text>
  <text x="520" y="802" fill="#0F172A" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30">负责代码、测试、文档和自动验收</text>
  <text x="1120" y="792" fill="#92400E" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">AI 执行</text>

  <path d="M700 350V388" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M700 510V548" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
  <path d="M700 670V708" stroke="#94A3B8" stroke-width="8" stroke-linecap="round"/>
</svg>
