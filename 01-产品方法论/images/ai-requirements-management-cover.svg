<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="1440" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#0B5D52"/>
      <stop offset="1" stop-color="#D9F99D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blur" x="-200" y="-200" width="2000" height="1300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#bg)"/>
  <circle cx="1320" cy="160" r="160" fill="#22C55E" fill-opacity="0.22" filter="url(#blur)"/>
  <circle cx="250" cy="760" r="220" fill="#FACC15" fill-opacity="0.16" filter="url(#blur)"/>
  <circle cx="760" cy="430" r="260" fill="#14B8A6" fill-opacity="0.16" filter="url(#blur)"/>

  <rect x="88" y="86" width="1424" height="728" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <text x="140" y="180" fill="#D1FAE5" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" letter-spacing="4">PRODUCT METHOD</text>
  <text x="140" y="300" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="84" font-weight="700">AI时代的需求管理</text>
  <text x="140" y="370" fill="#DCFCE7" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34">需求不清，不会被 AI 修复，只会被 AI 放大</text>

  <g opacity="0.95">
    <rect x="140" y="470" width="240" height="120" rx="24" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.7"/>
    <text x="182" y="525" fill="#BAE6FD" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">战略层</text>
    <text x="182" y="563" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600">Why</text>

    <rect x="430" y="470" width="240" height="120" rx="24" fill="#0C4A6E" stroke="#67E8F9" stroke-opacity="0.7"/>
    <text x="472" y="525" fill="#CFFAFE" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">需求层</text>
    <text x="472" y="563" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600">Who + What</text>

    <rect x="720" y="470" width="280" height="120" rx="24" fill="#14532D" stroke="#86EFAC" stroke-opacity="0.7"/>
    <text x="764" y="525" fill="#DCFCE7" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">行为层</text>
    <text x="764" y="563" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600">When + How much</text>

    <rect x="1050" y="470" width="240" height="120" rx="24" fill="#3F6212" stroke="#BEF264" stroke-opacity="0.8"/>
    <text x="1092" y="525" fill="#ECFCCB" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">实现层</text>
    <text x="1092" y="563" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600">How</text>
  </g>

  <path d="M390 530H420" stroke="#A7F3D0" stroke-width="8" stroke-linecap="round"/>
  <path d="M680 530H710" stroke="#A7F3D0" stroke-width="8" stroke-linecap="round"/>
  <path d="M1010 530H1040" stroke="#A7F3D0" stroke-width="8" stroke-linecap="round"/>

  <text x="140" y="700" fill="#F0FDF4" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">Human 定义目标与边界，AI 负责场景推导、实现与校验</text>
  <text x="140" y="744" fill="#BBF7D0" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22">从“高效做错”转向“按层管理需求”</text>
</svg>
