<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="860" rx="28" fill="url(#bg)"/>
  <text x="92" y="118" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="54" font-weight="700">AI 协作里最危险的不是做不出来，而是高效做错</text>
  <text x="92" y="168" fill="#CBD5E1" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26">需求偏差一旦进入短链路，AI 会把遗漏的场景快速包装成看起来完整的结果</text>

  <rect x="92" y="250" width="1216" height="144" rx="26" fill="#3F3F46" fill-opacity="0.5" stroke="#52525B"/>
  <text x="134" y="307" fill="#FCA5A5" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">1. 需求偏差</text>
  <text x="134" y="351" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="600">关键场景没有被明确表达</text>

  <path d="M700 412V454" stroke="#FDA4AF" stroke-width="10" stroke-linecap="round"/>

  <rect x="92" y="478" width="1216" height="144" rx="26" fill="#7F1D1D" fill-opacity="0.35" stroke="#FB7185" stroke-width="2"/>
  <text x="134" y="535" fill="#FFE4E6" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">2. AI 快速生成正确但方向错误的实现</text>
  <text x="134" y="579" fill="#FFFFFF" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="600">代码能跑，页面能点，但目标没有被真正覆盖</text>

  <path d="M700 640V682" stroke="#FDBA74" stroke-width="10" stroke-linecap="round"/>

  <rect x="92" y="706" width="1216" height="92" rx="24" fill="#92400E" fill-opacity="0.35" stroke="#FBBF24" stroke-width="2"/>
  <text x="134" y="764" fill="#FEF3C7" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="600">3. 到验收才暴露：真正想要的用户路径根本没被实现</text>

  <g>
    <circle cx="1160" cy="310" r="22" fill="#7F1D1D"/>
    <circle cx="1160" cy="550" r="22" fill="#9A3412"/>
    <circle cx="1160" cy="752" r="22" fill="#92400E"/>
    <path d="M1149 309L1157 317L1173 301" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1149 549L1157 557L1173 541" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1149 751L1157 759L1173 743" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
